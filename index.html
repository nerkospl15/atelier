<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Atelier Grand Format</title>

<style>

/* GLOBAL */

body{

    margin:0;
    padding:20px;

    background:#111;
    color:white;

    font-family:Arial, sans-serif;

    overflow:hidden;

    height:100vh;

    box-sizing:border-box;
}

/* HORLOGE */

.clock{

    position:absolute;

    top:15px;
    right:25px;

    font-size:24px;

    font-weight:bold;

    color:#00ff99;
}

/* TITRE */

h1{

    font-size:42px;

    color:#00ff99;

    margin-bottom:20px;

    margin-top:0;
}

/* BLOCS */

.section{

    background:#222;

    padding:18px;

    margin-bottom:18px;

    border-radius:16px;

    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.section h2{

    font-size:28px;

    margin-top:0;

    margin-bottom:12px;
}

.section p{

    font-size:22px;

    margin:8px 0;
}

/* BLOC IMPORTANT */

.important{

    background:#5c1d1d;

    border-left:6px solid #ff4444;
}

/* BLOC NOTES */

.notes{

    background:white;

    height:120px;

    border-radius:16px;

    position:relative;

    overflow:hidden;

    box-shadow:0 0 10px rgba(0,0,0,0.4);

    margin-bottom:70px;
}

.notes-text{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:48px;

    font-weight:bold;

    color:rgba(0,0,0,0.12);

    letter-spacing:8px;

    pointer-events:none;
}

/* MESSAGE DÉFILANT */

.ticker{

    position:fixed;

    bottom:0;
    left:0;

    width:100%;

    background:#00aa66;

    overflow:hidden;

    padding:10px 0;

    border-top:3px solid #00ff99;

    z-index:999;
}

.ticker span{

    display:inline-block;

    white-space:nowrap;

    padding-left:100%;

    font-size:24px;

    font-weight:bold;

    color:white;

    animation:defilement 20s linear infinite;
}

@keyframes defilement{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-100%);
    }

}

</style>

</head>

<body>

<!-- HORLOGE -->

<div class="clock" id="clock"></div>

<!-- TITRE -->

<h1>🖨️ ATELIER IMPRESSION</h1>

<!-- PRODUCTION -->

<div class="section">

    <h2>📋 Productions du jour</h2>

    <p>DOSSIERS Steelbond → vendredi après-midi</p>

</div>

<!-- INFORMATIONS IMPORTANTES -->

<div class="section important">

    <h2>🚨 Informations importantes</h2>

    <p>🎉 Réunion jeudi à 13H pour les 30 ans 🎉</p>

</div>

<!-- NOTES -->

<div class="notes">

    <div class="notes-text">

        NOTES

    </div>

</div>

<!-- MESSAGE DÉFILANT -->

<div class="ticker">

    <span>

        ⚠️ Pensez à facturer les dossiers cette semaine : dossier terminé = facture dans banette ⚠️

    </span>

</div>

<!-- SCRIPT HORLOGE -->

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString('fr-FR');

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>

</html>
