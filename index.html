<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Atelier Grand Format</title>

<style>

/* GLOBAL */

body{

    margin:0;
    padding:20px;

    background-image:url("FOND%20ECRAN.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    color:white;

    font-family:"Segoe UI", sans-serif;

    overflow:hidden;

    height:100vh;

    box-sizing:border-box;
}

body::before{

    content:"";

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.35);

    z-index:-1;
}

/* HORLOGE */

.clock{

    position:absolute;

    top:15px;
    right:25px;

    font-size:28px;

    font-weight:600;

    color:#00ff99;
}

/* TITRE */

h1{

    font-size:48px;

    color:rgb(230,68,21);

    margin-top:0;
    margin-bottom:20px;

    font-weight:700;
}

/* BLOCS */

.section{

    background:rgba(34,34,34,0.90);

    padding:18px;

    margin-bottom:18px;

    border-radius:16px;

    backdrop-filter:blur(4px);

    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.section h2{

    font-size:28px;

    margin-top:0;

    margin-bottom:12px;
}

.section p{

    font-size:22px;

    margin:8px 0;
}

/* BLOC IMPORTANT */

.important{

    background:rgba(92,29,29,0.92);

    border-left:6px solid #ff4444;
}

/* NOTES FIXE EN BAS */

.notes{

    position:fixed;

    left:20px;
    right:20px;

    bottom:70px;

    height:220px;

    background:white;

    border-radius:18px;

    box-shadow:0 0 20px rgba(0,0,0,0.4);

    overflow:hidden;
}

.notes-text{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:90px;

    font-weight:700;

    letter-spacing:10px;

    color:rgba(0,0,0,0.10);
}

/* MESSAGE DÉFILANT */

.ticker{

    position:fixed;

    bottom:0;
    left:0;

    width:100%;

    background:#00aa66;

    overflow:hidden;

    padding:10px 0;

    border-top:3px solid #00ff99;

    z-index:999;
}

.ticker span{

    display:inline-block;

    white-space:nowrap;

    padding-left:100%;

    font-size:24px;

    font-weight:700;

    color:white;

    animation:defilement 20s linear infinite;
}

@keyframes defilement{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-100%);
    }

}

</style>

</head>

<body>

<div class="clock" id="clock"></div>

<h1>🖨️ ATELIER IMPRESSION</h1>

<div class="section">

    <h2>📋 Productions du jour</h2>

    <p></p>

</div>

<div class="section important">

    <h2>🚨 Informations importantes</h2>

    <p></p>

</div>

<div class="notes">

    <div class="notes-text">

        NOTES

    </div>

</div>

<div class="ticker">

    <span>

        Soyez sages pendant le weekend

    </span>

</div>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString('fr-FR');

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>

</html>
