```html
<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Atelier Impression</title>

<style>

body{
    margin:0;
    padding:40px;

    background:#111;
    color:white;

    font-family:Arial, sans-serif;
}

/* HORLOGE */

.clock{
    position:absolute;

    top:20px;
    right:40px;

    font-size:40px;
    font-weight:bold;

    color:#00ff99;
}

/* TITRE */

h1{
    font-size:70px;
    color:#00ff99;

    margin-bottom:40px;
}

/* BLOCS */

.section{

    background:#222;

    padding:25px;

    margin-bottom:25px;

    border-radius:20px;

    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.section h2{
    font-size:40px;
    margin-bottom:20px;
}

.section p{
    font-size:32px;
    margin:10px 0;
}

/* MESSAGE DÉFILANT */

.ticker{

    position:fixed;

    bottom:0;
    left:0;

    width:100%;

    background:#00aa66;

    overflow:hidden;

    padding:18px 0;

    border-top:4px solid #00ff99;
}

.ticker span{

    display:inline-block;

    white-space:nowrap;

    padding-left:100%;

    font-size:38px;

    font-weight:bold;

    color:white;

    animation:defilement 25s linear infinite;
}

@keyframes defilement{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-100%);
    }

}

</style>

</head>

<body>

<!-- HORLOGE -->

<div class="clock" id="clock"></div>

<!-- TITRE -->

<h1>🖨️ ATELIER IMPRESSION</h1>

<!-- INFOS -->

<div class="section">

    <h2>📋 Production du jour</h2>

    <p>COXX</p>

    <p>Expédition Chronopost</p>

</div>


<!-- MESSAGE DÉFILANT -->

<div class="ticker">

    <span>
        ⚠️ Pensez à facturer un max cette semaine : dossier terminé = facture dans banette ⚠️  </span>

</div>

<!-- SCRIPT HORLOGE -->

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString('fr-FR');

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>

</html>
```
